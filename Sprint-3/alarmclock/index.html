<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Title here</title>
  </head>
  <body class="app-body">
    <div class="centre alarm-card">
      <h1 id="timeRemaining" class="timer-title">Time Remaining: 00:00</h1>
      <p class="helper-text">Add the seconds you want to wait.</p>
      <label class="input-label" for="alarmSet">Set time to:</label>
      <input id="alarmSet" type="number" />

      <div class="button-row">
        <button id="set" type="button">Set Alarm</button>
        <button id="stop" type="button">Stop Alarm</button>
      </div>
      <p class="small-note">Tip: press stop to quiet the bell.</p>
    </div>
    <script src="alarmclock.js"></script>
  </body>
</html>
